name: CI (Node + Python Tests)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Node dependencies
      run: npm ci

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install allure-pytest
        playwright install --with-deps chromium

    - name: Start server in background
      run: npm start &

    - name: Wait for server
      uses: nick-fields/retry@v3
      with:
        timeout_minutes: 1
        max_attempts: 10
        retry_on: error
        command: curl --fail http://localhost:3000 || exit 1

    - name: Run pytest with Allure
      run: pytest -v tests/ --alluredir=allure-results

    - name: Upload Allure results
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: allure-results

    - name: Install Allure CLI
      run: |
        sudo apt-get update
        sudo apt-get install -y default-jre unzip wget
        wget https://github.com/allure-framework/allure2/releases/latest/download/allure-2.38.1.tgz
        tar -xzf allure-2.38.1.tgz
        sudo mv allure-2.38.1 /opt/allure
        sudo ln -s /opt/allure/bin/allure /usr/bin/allure

    - name: Generate Allure report
      run: allure generate allure-results -o allure-report

    - name: Upload Allure report
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report
        
    - name: Deploy Allure report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./allure-report
