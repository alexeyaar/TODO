<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Простой To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Мои задачи</h1>

    <form id="todo-form">
      <input type="text" id="todo-input" placeholder="Что нужно сделать?" autocomplete="off" required>
      <button type="submit">Добавить</button>
    </form>
    <div style="text-align: center; margin: 1.5rem 0;">
  <button id="load-random" type="button">Загрузить 5 случайных задач из интернета</button>
</div>

    <ul id="todo-list"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
